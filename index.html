<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
شجره نامه خاندان یزدانی و هوشیار سوداگر
</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;

background:url('cover.png');
background-size:cover;
background-position:center;

font-family:tahoma;
}

/* دکمه وسط صفحه */
.start-btn{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:20px 50px;

font-size:28px;

border:none;

border-radius:20px;

cursor:pointer;

background:#0d5f44;
color:white;

}

/* کوچک کردن عکس پس‌زمینه */
body::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:60%;
height:60%;
transform:translate(-50%,-50%);
background:url('cover.png') no-repeat center;
background-size:contain;
z-index:-1;
}

</style>

</head>

<body>

<button
class="start-btn"
onclick="location.href='map.html'"
>
آغاز سفر در تاریخ خاندان
</button>

</body>

</html>
