<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شجره نامه خاندان یزدانی و هوشیار سوداگر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
font-family:tahoma;
overflow:hidden;

/* نسخه کامپیوتر */

background-image:url("cover-desktop.jpeg");
background-size:cover;
background-position:center center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

}

/* دکمه */

.start-btn{

padding:18px 45px;

font-size:28px;

background:#0d5f44;

color:white;

border:none;

border-radius:18px;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 25px rgba(0,0,0,.35);

}

.start-btn:hover{

transform:scale(1.05);

background:#0a4d37;

}

/* ---------- نسخه موبایل ---------- */

@media screen and (max-width:768px){

body{

background-image:url("cover-mobile.jpeg");

background-size:cover;

background-position:center;

}

.start-btn{

font-size:20px;

padding:16px 30px;

width:85%;

max-width:320px;

}

}

</style>

</head>

<body>

<button class="start-btn"
onclick="location.href='map.html'">

آغاز سفر در تاریخ خاندان

</button>

</body>

</html>
